<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mantle Bridge</title>
  <meta name="description" content="Mantle Bridge moves ETH and tokens between Ethereum and Mantle through a fast, low-fee route.">
  <link rel="canonical" href="https://mantlebridge.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F4F6F8">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Mantle Bridge">
  <meta property="og:description" content="Mantle Bridge moves ETH and tokens between Ethereum and Mantle through a fast, low-fee route.">
  <meta property="og:url" content="https://mantlebridge.github.io/">
  <meta property="og:image" content="https://mantlebridge.github.io/og-cover.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mantle Bridge">
  <meta name="twitter:description" content="Move ETH and tokens between Ethereum and Mantle in one clean, fast flow.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#"><img src="favicon.png" width="28" height="28" alt="" style="border-radius:50%"> Mantle Bridge</a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Bridges</a>
      <a href="https://l2beat.com/scaling/projects/mantle" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>
    <span class="sp"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>Mantle Bridge</h1>
    <p class="sub"><strong>Mantle Bridge</strong> moves ETH and tokens between Ethereum and Mantle through a fast, low-fee route.</p>

    <section class="card" aria-label="Bridge route">
      <div class="route">
        <div class="leg">
          <span class="lbl">From</span>
          <span class="chip">
            <img class="ic" src="eth.png" width="26" height="26" alt="ETH">
            <span class="t">ETH</span>
          </span>
        </div>
        <button class="dir" type="button" data-dir aria-label="Switch direction"><span class="ar">&#8594;</span></button>
        <div class="leg">
          <span class="lbl">To</span>
          <span class="chip">
            <img class="ic" src="mnt.png" width="26" height="26" alt="MNT">
            <span class="t">MNT</span>
          </span>
        </div>
      </div>
      <a class="act" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
      <p class="note">Preview only &mdash; rates, routes and fees are shown in the app.</p>
    </section>
  </main>

  <footer class="foot">
    <b>Mantle Bridge</b> &mdash; 2026
  </footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      { "@type": "WebSite", "@id": "https://avalanche-ecosystem.github.io/#website", "url": "https://avalanche-ecosystem.github.io/", "name": "Mantle Bridge", "inLanguage": "en" },
      { "@type": "Organization", "@id": "https://avalanche-ecosystem.github.io/#org", "name": "Mantle", "url": "https://avalanche-ecosystem.github.io/", "sameAs": ["https://www.mantle.xyz/","https://x.com/0xMantle","https://github.com/mantlenetworkio","https://docs.mantle.xyz/"] },
      { "@type": "WebApplication", "@id": "https://avalanche-ecosystem.github.io/#app", "name": "Mantle Bridge", "applicationCategory": "FinanceApplication", "operatingSystem": "Web", "url": "https://avalanche-ecosystem.github.io/", "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" } }
    ]
  }
  </script>

  <script>
  /* Simple — direction switch swaps the two chips (icons + labels only; number-free). */
  (function(){
    "use strict";
    var root=document, btn=root.querySelector('[data-dir]');
    if(!btn) return;
    btn.addEventListener('click', function(){
      var chips=root.querySelectorAll('.leg .chip');
      if(chips.length>=2){ var t=chips[0].innerHTML; chips[0].innerHTML=chips[1].innerHTML; chips[1].innerHTML=t; }
    });
  })();
  </script>
</body>
</html>
